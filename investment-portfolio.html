<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Investment Portfolio — EquitiFy Capital</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="site.css">
<script src="site.js" defer></script>
<style>
  :root{
    --ink:#33465C;--ink-soft:#6C7C8D;--navy:#1B2A3B;--navy-deep:#141F2C;
    --accent:#51BAFF;--accent-deep:#2A93E6;--accent-on-dark:#6FC5FF;--accent-tint:#EAF4FF;
    --line:#E1E5EA;--line-on-dark:#2B3B4E;--bg:#FFFFFF;--bg-tint:#F5F7F9;--ink-on-navy:#AEB9C6;
    --radius:4px;
    --ease:cubic-bezier(.19,1,.22,1);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{font-family:'Libre Franklin',sans-serif;background:var(--bg);color:var(--ink);overflow-x:clip;}
  img{max-width:100%;display:block;}
  a{color:inherit;text-decoration:none;}
  svg{display:block;}

  /* ===================================================================
     HAMBURGER + FULL-SCREEN MENU — mirrors the homepage nav treatment.
     Colors flip from white (over the dark hero) to navy once scrolled
     onto the white body, driven by site.js's .ec-scrolled class.
     =================================================================== */
  @media (min-width:901px){
    .ec-nav.ec-nav--overlay,
    .ec-nav.ec-nav--overlay.ec-scrolled{
      position:fixed;top:0;left:0;right:0;bottom:auto;width:auto;height:auto;
      background:transparent!important;border:none!important;box-shadow:none!important;
    }
    .ec-nav--overlay .ec-nav-inner{
      max-width:none;height:74px;padding:0 44px;
      flex-direction:row;align-items:center;justify-content:flex-end;gap:22px;
      position:relative;z-index:60;
    }
    .ec-nav--overlay .ec-toggle{display:block;order:1;position:relative;z-index:60;}
    .ec-nav--overlay .ec-logo{position:relative;z-index:60;order:0;}
    .ec-nav--overlay .ec-cta-d{display:none;}
    .ec-nav--overlay .ec-links{display:none;}

    .ec-nav--overlay .ec-logo{color:#fff!important;transition:color .35s var(--ease);}
    .ec-nav--overlay .ec-toggle span{background:#fff!important;transition:background .35s var(--ease),transform .3s ease,opacity .2s ease,top .3s ease,bottom .3s ease;}
    .ec-nav--overlay.ec-scrolled .ec-logo{color:var(--navy)!important;}
    .ec-nav--overlay.ec-scrolled .ec-toggle span{background:var(--navy)!important;}

    /* --- OPENED: full white page, links centered --- */
    .ec-nav--overlay.is-open .ec-links{
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
      position:fixed;inset:0;width:100vw;height:100vh;height:100dvh;
      background:#fff;padding:130px 40px;z-index:40;
    }
    .ec-nav--overlay.is-open .ec-links a:not(.btn){
      font-size:clamp(20px,2.4vw,30px);font-weight:600;letter-spacing:-0.015em;
      color:var(--navy)!important;padding:8px 0;
    }
    .ec-nav--overlay.is-open .ec-links a:not(.btn):hover{color:var(--accent-deep)!important;}
    .ec-nav--overlay.is-open .ec-has-sub{flex-direction:column;align-items:center;}
    .ec-nav--overlay.is-open .ec-has-sub > a{display:inline-flex;align-items:center;gap:10px;cursor:pointer;}
    .ec-nav--overlay.is-open .ec-has-sub > a .ec-caret{display:inline-block;width:22px;height:22px;transition:transform .3s ease;}
    .ec-nav--overlay.is-open .ec-has-sub.is-open > a .ec-caret{transform:rotate(180deg);}
    .ec-nav--overlay.is-open .ec-sub{
      display:none;flex-direction:column;align-items:center;
      position:static;opacity:1;visibility:visible;transform:none;
      background:none;border:none;box-shadow:none;min-width:0;padding:6px 0 0;
    }
    .ec-nav--overlay.is-open .ec-has-sub.is-open .ec-sub{display:flex;}
    .ec-nav--overlay.is-open .ec-links .ec-sub a{font-size:clamp(15px,1.7vw,20px);color:var(--ink-soft)!important;padding:7px 0;text-align:center;}
    .ec-nav--overlay.is-open .ec-links .ec-sub a:hover{color:var(--accent-deep)!important;}
    .ec-nav--overlay .ec-cta-m{display:none;}
    .ec-nav--overlay.is-open .ec-cta-m,
    .ec-nav--overlay.is-open .ec-cta-m:hover{display:inline-flex;margin-top:26px;color:#fff!important;}
    body .ec-nav--overlay.is-open .ec-logo{color:var(--navy)!important;}
    body .ec-nav--overlay.is-open .ec-toggle span{background:var(--navy)!important;}
  }

  /* ===== HERO — dark full-bleed, matching the homepage ===== */
  .pf-hero{position:relative;min-height:48vh;display:flex;align-items:center;overflow:hidden;background:var(--navy-deep);}
  .pf-hero-bg{position:absolute;inset:0;z-index:0;}
  .pf-hero-bg img{width:100%;height:100%;object-fit:cover;}
  .pf-hero::after{content:"";position:absolute;inset:0;z-index:1;background:linear-gradient(180deg,rgba(20,31,44,.7) 0%,rgba(20,31,44,.5) 50%,rgba(20,31,44,.82) 100%);}
  .pf-hero-inner{position:relative;z-index:2;max-width:1240px;width:100%;margin:0 auto;padding:112px 40px 56px;}
  .pf-hero .eyebrow{
    display:inline-flex;align-items:center;gap:10px;
    font-size:12px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;
    color:var(--accent-on-dark);margin-bottom:22px;
  }
  .pf-hero .eyebrow::before{content:"";width:26px;height:1px;background:currentColor;}
  .pf-hero h1{
    font-weight:800;font-size:clamp(2.2rem,5.4vw,4.6rem);line-height:1.02;letter-spacing:-0.035em;
    text-transform:uppercase;color:#fff;margin-bottom:24px;max-width:14ch;
  }
  .pf-hero p{font-size:16px;line-height:1.75;color:rgba(255,255,255,.82);max-width:520px;}

  /* ===== LAYOUT ===== */
  .pf-wrap{max-width:1240px;margin:0 auto;padding:90px 40px 120px;display:grid;grid-template-columns:230px 1fr;gap:44px;align-items:start;}

  /* Sidebar */
  .pf-side{position:sticky;top:110px;display:flex;flex-direction:column;gap:6px;}
  .pf-side-label{font-size:11.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--accent-deep);margin-bottom:14px;}
  .pf-cat{display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;padding:12px 15px;border:1px solid var(--line);border-radius:6px;background:#fff;cursor:pointer;font:inherit;font-size:14px;font-weight:500;color:var(--ink);text-align:left;transition:border-color .3s var(--ease),background .3s var(--ease),color .3s var(--ease);}
  .pf-cat:hover{border-color:var(--accent);}
  .pf-cat.is-active{background:var(--navy);border-color:var(--navy);color:#fff;}
  .pf-cat .pf-count{font-size:11px;font-weight:700;min-width:26px;text-align:center;padding:2px 7px;border-radius:20px;background:var(--bg-tint);color:var(--ink-soft);}
  .pf-cat.is-active .pf-count{background:rgba(255,255,255,.16);color:#fff;}

  /* Toolbar + grid */
  .pf-count-line{font-size:13px;color:var(--ink-soft);margin-bottom:22px;}
  .pf-count-line b{color:var(--navy);font-weight:700;}
  .pf-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px;}
  .pf-empty{padding:60px 0;text-align:center;color:var(--ink-soft);font-size:14px;}

  .pf-card{border:1px solid var(--line);border-radius:6px;overflow:hidden;background:#fff;cursor:pointer;text-align:left;font:inherit;color:inherit;padding:0;transition:border-color .4s var(--ease),transform .4s var(--ease),box-shadow .4s var(--ease);}
  .pf-card:hover{border-color:var(--accent);transform:translateY(-6px);box-shadow:0 24px 50px -24px rgba(20,31,44,.35);}
  .pf-card:hover .pf-media{transform:scale(1.05);}
  .pf-media{transition:transform .9s var(--ease);}
  .pf-media{position:relative;aspect-ratio:16/11;background:var(--bg-tint) center/cover no-repeat;}
  .pf-media::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(20,31,44,0) 55%,rgba(20,31,44,.55));}
  .pf-tag{position:absolute;top:12px;left:12px;z-index:1;font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#fff;padding:5px 10px;border-radius:20px;}
  .pf-sf{position:absolute;top:12px;right:12px;z-index:1;font-size:11px;font-weight:700;color:#fff;padding:5px 10px;border-radius:20px;background:rgba(20,31,44,.6);backdrop-filter:blur(2px);}
  .pf-media .pf-name{position:absolute;left:14px;bottom:34px;right:14px;z-index:1;color:#fff;font-size:16px;font-weight:700;line-height:1.25;}
  .pf-media .pf-loc{position:absolute;left:14px;bottom:12px;z-index:1;display:inline-flex;align-items:center;gap:5px;color:#dfe6ee;font-size:12px;}
  .pf-media .pf-loc svg{width:13px;height:13px;}

  /* ===== MODAL ===== */
  .pf-modal{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;padding:24px;background:rgba(20,31,44,.55);}
  .pf-modal.is-open{display:flex;}
  .pf-dialog{background:#fff;border-radius:12px;width:min(890px,100%);max-height:88vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 30px 70px -20px rgba(0,0,0,.5);}
  .pf-dialog-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;padding:22px 24px 0;}
  .pf-dialog-head h2{font-size:20px;font-weight:700;color:var(--navy);line-height:1.25;}
  .pf-dialog-head .pf-sub{margin-top:4px;font-size:12.5px;color:var(--ink-soft);display:inline-flex;align-items:center;gap:5px;}
  .pf-dialog-head .pf-sub svg{width:13px;height:13px;}
  .pf-close{flex-shrink:0;width:34px;height:34px;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;color:var(--ink);display:flex;align-items:center;justify-content:center;transition:border-color .15s,color .15s;}
  .pf-close:hover{border-color:var(--accent);color:var(--accent-deep);}
  .pf-close svg{width:18px;height:18px;}
  .pf-tabs{display:flex;gap:4px;padding:16px 24px 0;border-bottom:1px solid var(--line);}
  .pf-tab{font:inherit;font-size:13.5px;font-weight:600;color:var(--ink-soft);background:none;border:none;border-bottom:2px solid transparent;padding:10px 6px 12px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:color .15s,border-color .15s;}
  .pf-tab svg{width:16px;height:16px;}
  .pf-tab:hover{color:var(--navy);}
  .pf-tab.is-active{color:var(--accent-deep);border-bottom-color:var(--accent-deep);}
  .pf-panel{display:none;min-height:0;}
  .pf-panel.is-active{display:flex;flex-direction:column;min-height:0;}
  .pf-map{width:100%;height:380px;border:0;display:block;background:var(--bg-tint);flex-shrink:0;}
  .pf-map-link{display:block;padding:10px 24px;font-size:12px;color:var(--accent-deep);border-top:1px solid var(--line);}
  .pf-details{padding:22px 24px 26px;overflow-y:auto;flex:1 1 auto;min-height:0;}
  .pf-facts{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-bottom:20px;}
  .pf-fact{background:#fff;padding:14px 16px;}
  .pf-facts .pf-fact:last-child:nth-child(odd){grid-column:1 / -1;}
  .pf-fact .k{font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:5px;}
  .pf-fact .v{font-size:14px;font-weight:600;color:var(--navy);}
  .pf-desc h3{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:8px;}
  .pf-desc p{font-size:14px;line-height:1.75;color:var(--ink-soft);}

  @media (max-width:820px){
    .pf-wrap{grid-template-columns:1fr;gap:22px;padding:28px 24px 70px;}
    .pf-side{position:static;flex-direction:row;flex-wrap:wrap;}
    .pf-side-label{width:100%;}
    .pf-cat{width:auto;}
    .pf-hero h1{font-size:2.2em;}
    .pf-facts{grid-template-columns:1fr;}
    .pf-map{height:300px;}
  }
</style>
</head>
<body>

<site-header base="" active="" overlay></site-header>

<!-- ===== HERO ===== -->
<section class="pf-hero">
  <div class="pf-hero-bg"><img src="public/building-2.jpg" alt=""></div>
  <div class="pf-hero-inner">
    <div class="eyebrow">Investment Portfolio</div>
    <h1>Assets we've financed and acquired</h1>
    <p>A view of the gas station, QSR, and commercial real estate assets EquitiFy Capital has financed and acquired.</p>
  </div>
</section>

<!-- ===== BODY ===== -->
<div class="pf-wrap">
  <aside class="pf-side" id="pfSide">
    <div class="pf-side-label">Filter by type</div>
    <!-- category buttons injected here -->
  </aside>

  <main>
    <div class="pf-count-line"><b id="pfCount">0</b> properties</div>
    <div class="pf-grid" id="pfGrid"></div>
    <div class="pf-empty" id="pfEmpty" style="display:none;">No properties in this category.</div>
  </main>
</div>

<site-footer base=""></site-footer>

<!-- ===== MODAL ===== -->
<div class="pf-modal" id="pfModal" role="dialog" aria-modal="true" aria-labelledby="pfDlgName">
  <div class="pf-dialog" role="document">
    <div class="pf-dialog-head">
      <div>
        <h2 id="pfDlgName">Property</h2>
        <span class="pf-sub"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s7-7.58 7-12.5A7 7 0 0 0 5 9.5C5 14.42 12 22 12 22Z"/><circle cx="12" cy="9.5" r="2.4"/></svg><span id="pfDlgLoc">—</span></span>
      </div>
      <button class="pf-close" id="pfClose" aria-label="Close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
    </div>

    <div class="pf-tabs">
      <button class="pf-tab is-active" data-tab="map"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 4 3 6v14l6-2 6 2 6-2V4l-6 2-6-2Z"/><path d="M9 4v14M15 6v14"/></svg>Map</button>
      <button class="pf-tab" data-tab="details"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h16M4 12h16M4 19h10"/></svg>Details</button>
    </div>

    <div class="pf-panel is-active" data-panel="map">
      <iframe class="pf-map" id="pfMap" title="Property location map" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
      <a class="pf-map-link" id="pfMapLink" href="#" target="_blank" rel="noopener">Open in a larger map →</a>
    </div>

    <div class="pf-panel" data-panel="details">
      <div class="pf-details">
        <div class="pf-facts" id="pfFacts"></div>
        <div class="pf-desc">
          <h3>About this property</h3>
          <p id="pfDesc"></p>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="portfolio-data.js"></script>
<script>
(function(){
  "use strict";

  var PROPERTIES = (window.PORTFOLIO || []).slice();
  /* Only these categories are shown in the left filter list for now. */
  var CAT_ORDER = [
    // "Miscellaneous",
    // "Medical",
    "Gas Stations",
    // "Shopping Center",
    "Restaurants"
    // "Uncategorized"
  ];
  var CAT_COLOR = {"Uncategorized":"#6C7C8D"};
  PROPERTIES.forEach(function(p){ if(p.category && p.catColor && !CAT_COLOR[p.category]) CAT_COLOR[p.category] = p.catColor; });
  function catOf(p){ return p.category || "Uncategorized"; }

  var side  = document.getElementById("pfSide");
  var grid  = document.getElementById("pfGrid");
  var empty = document.getElementById("pfEmpty");
  var countEl = document.getElementById("pfCount");
  var activeCat = "All";

  function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g, function(c){ return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]; }); }
  function loc(p){ return [p.city, p.state].filter(Boolean).join(", "); }
  function sfText(p){ var s=(p.sqft||"").trim(); if(!s) return ""; return /sf|sq/i.test(s) ? s : s + " SF"; }

  /* ---- categories with counts ---- */
  function categories(){
    var counts = {}; PROPERTIES.forEach(function(p){ var c=catOf(p); counts[c] = (counts[c]||0)+1; });
    var list = [{name:"All", count:PROPERTIES.length}];
    CAT_ORDER.forEach(function(c){ if(counts[c]) list.push({name:c, count:counts[c]}); });
    /* Any category present in the data but not listed in CAT_ORDER stays hidden.
       (Re-enable to auto-show them again.)
    Object.keys(counts).forEach(function(c){ if(CAT_ORDER.indexOf(c)<0) list.push({name:c, count:counts[c]}); });
    */
    return list;
  }

  function renderSide(){
    var html = '<div class="pf-side-label">Filter by type</div>';
    categories().forEach(function(c){
      html += '<button class="pf-cat' + (c.name===activeCat?' is-active':'') + '" data-cat="' + esc(c.name) + '">'
            +   '<span>' + esc(c.name) + '</span><span class="pf-count">' + c.count + '</span>'
            + '</button>';
    });
    side.innerHTML = html;
  }

  function renderGrid(){
    var items = PROPERTIES.filter(function(p){ return activeCat==="All" || catOf(p)===activeCat; });
    countEl.textContent = items.length;
    empty.style.display = items.length ? "none" : "block";
    grid.innerHTML = items.map(function(p){
      var i = PROPERTIES.indexOf(p);
      var color = CAT_COLOR[catOf(p)] || "#1B2A3B";
      var sf = sfText(p);
      return '<button class="pf-card" data-i="' + i + '">'
        +  '<div class="pf-media" style="background-image:url(&quot;' + esc(p.image) + '&quot;)">'
        +    '<span class="pf-tag" style="background:' + esc(color) + '">' + esc(catOf(p)) + '</span>'
        +    (sf ? '<span class="pf-sf">' + esc(sf) + '</span>' : '')
        +    '<span class="pf-name">' + esc(p.name) + '</span>'
        +    '<span class="pf-loc"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s7-7.58 7-12.5A7 7 0 0 0 5 9.5C5 14.42 12 22 12 22Z"/><circle cx="12" cy="9.5" r="2.4"/></svg>' + esc(loc(p)) + '</span>'
        +  '</div>'
        + '</button>';
    }).join("");
  }

  side.addEventListener("click", function(e){
    var btn = e.target.closest(".pf-cat"); if(!btn) return;
    activeCat = btn.getAttribute("data-cat");
    renderSide(); renderGrid();
  });

  grid.addEventListener("click", function(e){
    var card = e.target.closest(".pf-card"); if(!card) return;
    openModal(PROPERTIES[+card.getAttribute("data-i")]);
  });

  /* ---- modal ---- */
  var modal = document.getElementById("pfModal");
  var mapFrame = document.getElementById("pfMap");
  var mapLink = document.getElementById("pfMapLink");

  function osmSrc(lat,lng){
    var d = 0.008;
    var bbox = (lng-d) + "," + (lat-d) + "," + (lng+d) + "," + (lat+d);
    return "https://www.openstreetmap.org/export/embed.html?bbox=" + bbox + "&layer=mapnik&marker=" + lat + "," + lng;
  }

  function setTab(name){
    modal.querySelectorAll(".pf-tab").forEach(function(t){ t.classList.toggle("is-active", t.getAttribute("data-tab")===name); });
    modal.querySelectorAll(".pf-panel").forEach(function(p){ p.classList.toggle("is-active", p.getAttribute("data-panel")===name); });
  }

  function openModal(p){
    document.getElementById("pfDlgName").textContent = p.name;
    document.getElementById("pfDlgLoc").textContent = loc(p);
    document.getElementById("pfDesc").textContent = p.description || "";

    var fullAddr = [p.address, [p.city, p.state].filter(Boolean).join(", "), p.zip].filter(Boolean).join(", ");
    document.getElementById("pfFacts").innerHTML =
        fact("Category", catOf(p))
      + fact("Address", fullAddr)
      + fact("Size", sfText(p))
      + fact("Property Type", p.subtype)
      + fact("Lot Size", p.lotSize)
      + fact("Year Built", p.yearBuilt)
      + fact("Tenancy", p.tenancy)
      + fact("Building Class", p.bldgClass)
      + fact("Floors", p.numFloors);

    mapFrame.src = osmSrc(p.lat, p.lng);
    mapLink.href = "https://www.openstreetmap.org/?mlat=" + p.lat + "&mlon=" + p.lng + "#map=15/" + p.lat + "/" + p.lng;

    setTab("map");
    modal.classList.add("is-open");
    document.body.style.overflow = "hidden";
  }
  function fact(k,v){ v = (v==null?"":String(v)).trim(); if(!v) return ""; return '<div class="pf-fact"><div class="k">' + esc(k) + '</div><div class="v">' + esc(v) + '</div></div>'; }

  function closeModal(){
    modal.classList.remove("is-open");
    document.body.style.overflow = "";
    mapFrame.src = "about:blank";   // stop the map when closed
  }

  document.getElementById("pfClose").addEventListener("click", closeModal);
  modal.addEventListener("click", function(e){ if(e.target === modal) closeModal(); });
  document.addEventListener("keydown", function(e){ if(e.key === "Escape" && modal.classList.contains("is-open")) closeModal(); });
  modal.querySelector(".pf-tabs").addEventListener("click", function(e){
    var t = e.target.closest(".pf-tab"); if(t) setTab(t.getAttribute("data-tab"));
  });

  renderSide();
  renderGrid();
})();
</script>

</body>
</html>
